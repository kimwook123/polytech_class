<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2단 레이아웃</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      #wrapper {
        width: 1200px;
      }
      #header {
        width: 100%;
        height: 120px;
        background: #eee;
      }
      #sidebar1 {
        width: 250px;
        height: 600px;
        background: #a09e9e;
        float: left;
      }
      #contents {
        width: 800px;
        height: 600px;
        background: #b9b7b7;
        float: left;
      }
      #sidebar2 {
        width: 150px;
        height: 600px;
        background: #a09e9e;
        float: right;
      }
      #footer {
        width: 100%;
        height: 100px;
        clear: both;
        background: #464444;
      }
    </style>
  </head>
  <body>
    <div id="wrapper">
      <div id="header">헤더</div>
      <div id="sidebar1">사이드바</div>
      <div id="contents">본문</div>
      <div id="sidebar2">사이드바</div>
      <div id="footer">푸터</div>
    </div>
  </body>
</html>
