<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>컴퓨터 수리 서비스 신청서</title>
    <link rel="stylesheet" href="ex/style.css" />
    <script>
      function handleSubmit(event) {
        alert("제출이 완료되었습니다!");
      }
    </script>
  </head>
  <body>
    <form onsubmit="handleSubmit()">
      <fieldset>
        <legend><b>개인정보 입력</b></legend>
        <ul>
          <li>
            <b>이름</b>
            <label for="user-name">
              <input
                type="text"
                id="user_name"
                autofocus
                required
                placeholder="한글만 입력"
              />
            </label>
          </li>
          <li>
            <b>아이디</b>
            <label for="user_id">
              <input
                type="text"
                id="user_id"
                required
                placeholder="영어를 포함한 숫자만 입력"
              />
            </label>
          </li>
          <li>
            <b>비밀번호</b>
            <label for="user_pwd">
              <input type="text" id="user_pwd" required />
            </label>
          </li>
        </ul>
      </fieldset>
      <fieldset>
        <legend><b>서비스 신청 내용</b></legend>
        <ul>
          <li>
            <b>서비스 희망 방문일</b>
            <label for="wish_coming">
              <input type="date" id="wish_coming" />
            </label>
          </li>
          <li>
            <b>서비스 희망 시간</b>
            <label for="wish_time">
              <input type="time" id="wish_time" />
            </label>
          </li>
          <li>
            <b>희망 서비스</b>
            <label for="wish_service">
              <input
                type="radio"
                id="wish_service"
                name="repair"
                value="repair"
              />부품수리
              <input
                type="radio"
                id="wish_service"
                name="fix"
                value="fix"
              />부품교체
              <input
                type="radio"
                id="wish_service"
                name="income"
                value="income"
              />직접방문
            </label>
          </li>
          <li>
            <b>추가 서비스</b>
            <label for="plus_service">
              <input type="checkbox" id="plus_service" value="lan" />랜선
              <input type="checkbox" id="plus_service" value="organize" />선
              정리
              <input type="checkbox" id="plus_service" value="long_pad" />장패드
            </label>
          </li>
        </ul>
      </fieldset>
      <input type="submit" value="제출하기" />
      <input type="reset" value="다시 작성" />
    </form>
  </body>
</html>
