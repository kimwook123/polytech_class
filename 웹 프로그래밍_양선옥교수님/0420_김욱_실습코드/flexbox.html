<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>플렉스 박스 레이아웃 결과물</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: sans-serif;
        padding: 20px;
        background-color: #fff;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #e0e0e0;
        padding: 10px 20px;
        margin-bottom: 20px;
      }
      .logo {
        background-color: yellow;
        padding: 10px 20px;
        font-weight: bold;
        color: orange;
      }
      .header-title {
        font-weight: bold;
        font-size: 1.2rem;
      }
      .nav-menu {
        display: flex;
        gap: 15px;
        list-style: none;
        color: #999;
        font-size: 0.9rem;
      }
      .container {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
      }
      .post-section {
        flex: 2;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .post {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 30px 20px;
        font-weight: bold;
      }
      .sidebar {
        flex: 1;
        background-color: #f0f0f0;
        display: flex;
        /* justify-content: center; */
        /* align-items: center; */
        padding: 20px;
        font-weight: bold;
        min-height: 300px;
      }
      footer {
        background-color: #e0e0e0;
        padding: 20px;
        text-align: center;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">로고</div>
      <div class="header-title">Header</div>
      <ul class="nav-menu">
        <li>메뉴1</li>
        <li>메뉴1</li>
        <li>메뉴1</li>
      </ul>
    </header>
    <div class="container">
      <section class="post-section">
        <div class="post">첫 번째 포스트</div>
        <div class="post">두 번째 포스트</div>
        <div class="post">세 번째 포스트</div>
      </section>
      <aside class="sidebar">Right Content (Sidebar)</aside>
    </div>
    <footer>Footer</footer>
  </body>
</html>
