<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM event 객체</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .container {
        width: 500px;
        height: 300px;
        border: 1px solid #222;
      }
    </style>
  </head>
  <body>
    <div class="container"></div>

    <script>
      // Do it! event 객체 사용하기
      const container = document.querySelector(".container"); // 클릭 위치를 화면에 표시하고 event 객체 정보를 콘솔에 출력
      container.addEventListener("click", function (e) {
        const x = e.clientX;
        const y = e.clientY;
        this.textContent = `클릭 좌표: ${x}, ${y}`;
        console.log("Event:", e.type, "target:", e.target);
      });
    </script>
  </body>
</html>
