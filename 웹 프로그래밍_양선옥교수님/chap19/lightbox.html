<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <title>лқјмқҙнҠёл°•мҠӨ</title>
    <link rel="stylesheet" href="css/lightbox.css" />
  </head>
  <body>
    <div class="row">
      <ul>
        <li>
          <img
            src="images/tree-1-thumb.jpg"
            data-src="images/tree-1.jpg"
            class="pic"
          />
        </li>
        <li>
          <img
            src="images/tree-2-thumb.jpg"
            data-src="images/tree-2.jpg"
            class="pic"
          />
        </li>
        <li>
          <img
            src="images/tree-3-thumb.jpg"
            data-src="images/tree-3.jpg"
            class="pic"
          />
        </li>
        <li>
          <img
            src="images/tree-4-thumb.jpg"
            data-src="images/tree-4.jpg"
            class="pic"
          />
        </li>
        <li>
          <img
            src="images/tree-5-thumb.jpg"
            data-src="images/tree-5.jpg"
            class="pic"
          />
        </li>
        <li>
          <img
            src="images/tree-6-thumb.jpg"
            data-src="images/tree-6.jpg"
            class="pic"
          />
        </li>
      </ul>
    </div>
    <div id="lightbox">
      <img src="images/tree-1.jpg" alt="" id="lightboxImage" />
    </div>

    <script>
      //pic нҒҙлһҳмҠӨ мҡ”мҶҢ лӘЁл‘җ к°Җм ёмҳӨкё°
      const originSrc = [
        "images/tree-1.jpg",
        "images/tree-2.jpg",
        "images/tree-3.jpg",
        "images/tree-4.jpg",
        "images/tree-5.jpg",
        "images/tree-6.jpg",
      ];
      const pics = document.querySelectorAll(".pic");
      //lightbox мҡ”мҶҢ к°Җм ёмҳӨкё°
      const lightbox = document.querySelector("#lightbox");

      //lightboxImage мҡ”мҶҢ к°Җм ёмҳӨкё°
      const lightboxImage = document.querySelector("#lightboxImage");

      //pic лӘЁл“  мҡ”мҶҢм—җ лҰ¬мҠӨл„Ҳ л¶ҷмқҙкё°
      for (let i = 0; i < pics.length; i++) {
        pics[i].addEventListener("click", showLightBox);
      }

      // pic мҡ”мҶҢ click мқҙлІӨнҠё л°ңмғқмӢң мІҳлҰ¬н•  н•ёл“Өлҹ¬(н•ЁмҲҳ) showLightBox() м„ м–ё
      function showLightBox() {
        //data-src мқҪм–ҙм„ң bigLocaationм—җ м ҖмһҘ
        let bigLocation = this.dataset.src;

        //bigImg к°’мқ„ lightboxImage.srcм—җ м ҖмһҘ
        lightboxImage.src = bigLocation;

        //lightbox мҡ”мҶҢ ліҙмқҙкё°(lightbox.style.display = "block";)
        lightbox.style.display = "block";
      }

      //(мҡ”мҶҢм—җ мқөлӘ…н•ЁмҲҳ л¶ҷмқҙкё°)lightbox мҡ”мҶҢ нҒҙлҰӯ мқҙлІӨнҠё л°ңмғқмӢң lightbox мҡ”мҶҢ к°җм¶”кё°(lightbox.style.display = "none";)
      lightbox.onclick = function () {
        lightbox.style.display = "none";
      };
    </script>
  </body>
</html>
