<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>할일 목록 - localStorage 예제</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        max-width: 600px;
        margin: 30px auto;
        padding: 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }
      .container {
        background-color: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }
      h1 {
        color: #333;
        text-align: center;
        margin-bottom: 30px;
      }
      .input-section {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      #todoInput {
        flex: 1;
        padding: 10px;
        border: 2px solid #ddd;
        border-radius: 5px;
        font-size: 16px;
        transition: border-color 0.3s;
      }
      #todoInput:focus {
        outline: none;
        border-color: #667eea;
      }
      button {
        padding: 10px 20px;
        background-color: #667eea;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: background-color 0.3s;
      }
      button:hover {
        background-color: #764ba2;
      }
      .control-buttons {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        justify-content: center;
      }
      .control-buttons button {
        flex: 1;
        padding: 8px;
        font-size: 14px;
      }
      #todoList {
        list-style: none;
        padding: 0;
      }
      .todo-item {
        display: flex;
        align-items: center;
        padding: 15px;
        background-color: #f8f9fa;
        border-left: 4px solid #667eea;
        margin-bottom: 10px;
        border-radius: 5px;
        transition: all 0.3s;
      }
      .todo-item:hover {
        background-color: #f0f0f0;
      }
      .todo-item.completed {
        opacity: 0.6;
        border-left-color: #28a745;
      }
      .todo-item.completed .todo-text {
        text-decoration: line-through;
        color: #999;
      }
      .todo-checkbox {
        width: 20px;
        height: 20px;
        margin-right: 15px;
        cursor: pointer;
      }
      .todo-text {
        flex: 1;
        color: #333;
        font-size: 16px;
      }
      .delete-btn {
        background-color: #dc3545;
        padding: 5px 10px;
        font-size: 12px;
        margin-left: 10px;
      }
      .delete-btn:hover {
        background-color: #c82333;
      }
      .stats {
        display: flex;
        justify-content: space-around;
        padding: 15px;
        background-color: #f0f0f0;
        border-radius: 5px;
        margin-top: 20px;
        text-align: center;
      }
      .stat-item {
        flex: 1;
      }
      .stat-number {
        font-size: 24px;
        font-weight: bold;
        color: #667eea;
      }
      .stat-label {
        font-size: 14px;
        color: #666;
      }
      .empty-message {
        text-align: center;
        color: #999;
        padding: 20px;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📝 할일 목록</h1>

      <div class="input-section">
        <input
          type="text"
          id="todoInput"
          placeholder="새로운 할일을 입력하세요..."
          onkeypress="handleKeyPress(event)"
        />
        <button onclick="addTodo()">추가</button>
      </div>

      <div class="control-buttons">
        <button
          onclick="clearCompleted()"
          style="background-color: #ffc107; color: #333"
        >
          완료한 항목 삭제
        </button>
        <button onclick="clearAll()" style="background-color: #dc3545">
          전체 삭제
        </button>
      </div>

      <ul id="todoList"></ul>

      <div class="empty-message" id="emptyMessage" style="display: none">
        할일이 없습니다. 새로운 할일을 추가해주세요!
      </div>

      <div class="stats">
        <div class="stat-item">
          <div class="stat-number" id="totalCount">0</div>
          <div class="stat-label">전체</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="completedCount">0</div>
          <div class="stat-label">완료</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="remainingCount">0</div>
          <div class="stat-label">남은 항목</div>
        </div>
      </div>
    </div>

    <script>
      const STORAGE_KEY = "todoList";

      // 초기 로드
      window.addEventListener("DOMContentLoaded", loadTodos);

      // 할일 추가
      function addTodo() {
        const input = document.getElementById("todoInput");
        const text = input.value.trim();

        if (text === "") {
          alert("할일을 입력해주세요!");
          return;
        }

        const todos = getTodos();
        const newTodo = {
          id: Date.now(),
          text: text,
          completed: false,
          createdAt: new Date().toLocaleString("ko-KR"),
        };

        todos.push(newTodo);
        saveTodos(todos);
        input.value = "";
        input.focus();
        loadTodos();
      }

      // 엔터 키 처리
      function handleKeyPress(event) {
        if (event.key === "Enter") {
          addTodo();
        }
      }

      // 할일 완료 토글
      function toggleTodo(id) {
        const todos = getTodos();
        const todo = todos.find((t) => t.id === id);
        if (todo) {
          todo.completed = !todo.completed;
          saveTodos(todos);
          loadTodos();
        }
      }

      // 할일 삭제
      function deleteTodo(id) {
        if (confirm("정말 삭제하시겠습니까?")) {
          const todos = getTodos();
          const filtered = todos.filter((t) => t.id !== id);
          saveTodos(filtered);
          loadTodos();
        }
      }

      // 완료한 항목만 삭제
      function clearCompleted() {
        const todos = getTodos();
        const remaining = todos.filter((t) => !t.completed);
        if (remaining.length === todos.length) {
          alert("완료한 항목이 없습니다.");
          return;
        }
        saveTodos(remaining);
        loadTodos();
      }

      // 전체 삭제
      function clearAll() {
        if (confirm("정말 전체 삭제하시겠습니까?")) {
          saveTodos([]);
          loadTodos();
        }
      }

      // localStorage에서 할일 가져오기
      function getTodos() {
        const data = localStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : [];
      }

      // localStorage에 할일 저장
      function saveTodos(todos) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
      }

      // 할일 목록 화면에 표시
      function loadTodos() {
        const todos = getTodos();
        const todoList = document.getElementById("todoList");
        const emptyMessage = document.getElementById("emptyMessage");

        todoList.innerHTML = "";

        if (todos.length === 0) {
          emptyMessage.style.display = "block";
        } else {
          emptyMessage.style.display = "none";
          todos.forEach((todo) => {
            const li = document.createElement("li");
            li.className = `todo-item ${todo.completed ? "completed" : ""}`;
            li.innerHTML = `
                        <input 
                            type="checkbox" 
                            class="todo-checkbox" 
                            ${todo.completed ? "checked" : ""} 
                            onchange="toggleTodo(${todo.id})"
                        >
                        <div>
                            <div class="todo-text">${escapeHtml(todo.text)}</div>
                            <small style="color: #999;">${todo.createdAt}</small>
                        </div>
                        <button class="delete-btn" onclick="deleteTodo(${todo.id})">삭제</button>
                    `;
            todoList.appendChild(li);
          });
        }

        updateStats(todos);
      }

      // 통계 업데이트
      function updateStats(todos) {
        const total = todos.length;
        const completed = todos.filter((t) => t.completed).length;
        const remaining = total - completed;

        document.getElementById("totalCount").textContent = total;
        document.getElementById("completedCount").textContent = completed;
        document.getElementById("remainingCount").textContent = remaining;
      }

      // HTML 특수문자 이스케이프 (XSS 방지)
      function escapeHtml(text) {
        const map = {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        };
        return text.replace(/[&<>"']/g, (m) => map[m]);
      }
    </script>
  </body>
</html>
