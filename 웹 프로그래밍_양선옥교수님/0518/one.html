<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1번</title>
  </head>
  <body>
    <script>
      let num1 = prompt("첫 번째 숫자를 입력하세요 : ");
      let num2 = prompt("두 번째 숫자를 입력하세요 : ");

      function showMax(num1, num2) {
        if (num1 > num2) {
          alert(`큰 수는 ${num1}입니다.`);
        } else if (num1 < num2) {
          alert(`큰 수는 ${num2}입니다.`);
        } else {
          alert(`두 수는 같습니다.`);
        }
      }

      showMax(num1, num2);
    </script>
  </body>
</html>
