<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>동아리 가입 신청서</title>
  </head>
  <body>
    <fieldset>
      <legend>2026학년도 코딩 동아리 가입 신청서</legend>
      (*)필수 입력 항목입니다. <br />
      이름(*):
      <input
        type="text"
        id="user_name"
        autofocus
        required
        placeholder="이름을 입력하세요"
      /><br />
      소속 대학교:
      <input type="text" id="user_school" value="한국대학교" readonly /><small
        >(수정 불가)</small
      ><br />
      이메일(*): <input type="email" id="user_email" /><br />
      연락처(*):
      <input type="tel" id="user_phone" placeholder="000-000-0000" /><br />
      희망 면접일: <input type="date" id="wish_test" /><br />
      희망 면접시간: <input type="time" id="wish_test_time" /><br />
      <b>희망 파트: </b>
      <input type="radio" name="wish_part" value="front" />프론트엔드
      <input type="radio" name="wish_part" value="back" />백엔드<br />
      <b>보유 장비 (중복 선택): </b>
      <input type="checkbox" name="get_item" value="notebook" />노트북
      <input type="checkbox" name="get_item" value="tablet" />태블릿 <br />
      <label for="memo">자기소개 및 포부: </label>
      <textarea
        id="memo"
        cols="40"
        rows="4"
        placeholder="짧게 작성해 주세요."
      ></textarea
      ><br />
      <input type="submit" value="신청서 제출" />
      <input type="reset" value="다시 쓰기" />
    </fieldset>
  </body>
</html>
