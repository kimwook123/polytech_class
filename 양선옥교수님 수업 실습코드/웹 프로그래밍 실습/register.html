<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>골든리트리버 - 회원가입</title>
    <style>
      /* 공통 스타일링 */
      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
        padding: 0;
        margin: 0;
        background: #fdfcf5;
        color: #333;
      }

      /* 헤더 영역 */
      .header {
        cursor: pointer;
        padding: 60px 20px;
        text-align: center;
        background-image:
          linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
          url("./images/Golden-Retriever-puppy-standing-outdoors.avif");
        background-size: cover;
        background-position: center 40%;
        color: white;
        text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
      }

      /* 폼 컨테이너 */
      .container {
        max-width: 600px;
        margin: -30px auto 50px; /* 헤더와 살짝 겹치게 배치 */
        padding: 0 20px;
      }

      .card {
        background-color: white;
        padding: 40px;
        border: 1px solid #e6e6e6;
        border-radius: 8px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      }

      .card h2 {
        font-size: 28px;
        color: #1a2a3a;
        border-left: 5px solid #c6a05e;
        padding-left: 15px;
        margin-bottom: 30px;
      }

      /* 폼 요소 스타일 */
      fieldset {
        border: none;
        padding: 0;
        margin-bottom: 30px;
      }

      legend {
        font-weight: bold;
        font-size: 18px;
        color: #1a2a3a;
        margin-bottom: 15px;
        padding-bottom: 5px;
        border-bottom: 2px solid #f0ece2;
        width: 100%;
      }

      ul {
        list-style: none;
        padding: 0;
      }

      li {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 600;
      }

      input[type="text"],
      input[type="password"],
      input[type="email"],
      input[type="tel"] {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 15px;
        transition: border-color 0.3s;
      }

      input:focus {
        outline: none;
        border-color: #c6a05e;
      }

      input[readonly] {
        background-color: #f9f9f9;
        color: #888;
        cursor: not-allowed;
      }

      /* 도움말 텍스트 */
      .placeholder-info {
        font-size: 12px;
        color: #c6a05e;
        margin-top: 5px;
      }

      /* 버튼 스타일 */
      .submit-btn {
        width: 100%;
        padding: 15px;
        background-color: #1a2a3a;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 17px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
      }

      .submit-btn:hover {
        background-color: #c6a05e;
      }

      /* 푸터 영역 */
      .footer {
        padding: 30px;
        text-align: center;
        background: #1a2a3a;
        color: #aaa;
        font-size: 13px;
        line-height: 1.6;
      }

      /* 반응형 */
      @media (max-width: 480px) {
        .card {
          padding: 25px;
        }
        .header h1 {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="header" onclick="location.href = 'palaces.html'">
      <h1>골든리트리버 커뮤니티</h1>
      <p>가족이 되어주셔서 감사합니다</p>
    </div>

    <div class="container">
      <div class="card">
        <h2>회원 가입</h2>
        <form id="signup">
          <fieldset>
            <legend>로그인 정보</legend>
            <ul>
              <li>
                <label for="userid">아이디</label>
                <input
                  id="userid"
                  name="userid"
                  type="text"
                  required
                  autofocus
                />
              </li>
              <li>
                <label for="pwd1">비밀번호</label>
                <input id="pwd1" name="pwd1" type="password" required />
              </li>
              <li>
                <label for="pwd2">비밀번호 확인</label>
                <input id="pwd2" name="pwd2" type="password" required />
              </li>
              <li>
                <label for="level">회원 등급</label>
                <input
                  id="level"
                  name="level"
                  type="text"
                  readonly
                  value="준회원"
                />
              </li>
            </ul>
          </fieldset>

          <fieldset>
            <legend>개인 정보</legend>
            <ul>
              <li>
                <label for="fullname">이름</label>
                <input
                  id="fullname"
                  name="fullname"
                  type="text"
                  placeholder="5자 미만 공백없이"
                  required
                />
              </li>
              <li>
                <label for="email">메일 주소</label>
                <input
                  id="email"
                  name="email"
                  type="email"
                  placeholder="abcd@domain.com"
                  required
                  autocomplete="off"
                />
              </li>
              <li>
                <label for="tel">연락처</label>
                <input
                  id="tel"
                  name="tel"
                  type="tel"
                  placeholder="010-0000-0000"
                  autocomplete="off"
                />
              </li>
            </ul>
          </fieldset>

          <button type="submit" class="submit-btn">가입 신청하기</button>
        </form>
        <script>
          document
            .getElementById("signup")
            .addEventListener("submit", function (event) {
              // 폼의 기본 제출 동작(페이지 새로고침)을 방지합니다.
              event.preventDefault();

              // 알림 메시지 표시
              alert("가입 신청이 완료되었습니다!");

              // 메인 화면으로 이동 (메인 파일명이 다르면 수정하세요)
              location.href = "palaces.html";
            });
        </script>
      </div>
    </div>

    <div class="footer">
      <p>
        (00486) 서울특별시 강아지구 강쥐로 104<br />
        대표번호: 1577-1577 | 관리: 강아지를 사랑하는 모임
      </p>
    </div>
  </body>
</html>
