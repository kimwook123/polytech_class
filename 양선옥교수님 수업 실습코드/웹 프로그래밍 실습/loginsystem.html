<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>골든리트리버 - 로그인</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
        padding: 0;
        margin: 0;
        background: #fdfcf5;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .header {
        cursor: pointer;
        padding: 40px 20px;
        text-align: center;
        background-image:
          linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
          url("./images/Golden-Retriever-puppy-standing-outdoors.avif");
        background-size: cover;
        background-position: center 40%;
        color: white;
        text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
      }

      .header h1 {
        font-size: 32px;
        margin: 0;
        letter-spacing: 3px;
      }

      /* 로그인 폼 컨테이너 */
      .login-container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .card {
        background-color: white;
        padding: 40px;
        width: 100%;
        max-width: 400px;
        border: 1px solid #e6e6e6;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      }

      .card h2 {
        font-size: 24px;
        color: #1a2a3a;
        border-left: 5px solid #c6a05e; /* 메인 포인트 컬러 */
        padding-left: 15px;
        margin-bottom: 30px;
        margin-top: 0;
      }

      /* 양식 스타일링 */
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      li {
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-weight: bold;
        margin-bottom: 8px;
        color: #333;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 16px;
      }

      input:focus {
        outline: none;
        border-color: #c6a05e;
        box-shadow: 0 0 5px rgba(198, 160, 94, 0.3);
      }

      /* 버튼 스타일링 */
      .button-group {
        margin-top: 30px;
      }

      button {
        width: 100%;
        padding: 14px;
        background-color: #1a2a3a;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background-color: #c6a05e;
        color: white;
      }

      .extra-links {
        margin-top: 20px;
        text-align: center;
        font-size: 14px;
      }

      .extra-links a {
        color: #666;
        text-decoration: none;
        margin: 0 10px;
      }

      .extra-links a:hover {
        text-decoration: underline;
        color: #c6a05e;
      }

      /* 푸터 스타일 */
      .footer {
        padding: 20px;
        text-align: center;
        background: #1a2a3a;
        color: #aaa;
        font-size: 13px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="header" onclick="location.href = 'palaces.html'">
      <h1>골든리트리버</h1>
    </div>

    <div class="login-container">
      <div class="card">
        <h2>로그인</h2>
        <form id="login-form">
          <ul>
            <li>
              <label for="userid">아이디</label>
              <input
                id="userid"
                name="userid"
                type="text"
                required
                autofocus
                placeholder="아이디를 입력하세요"
              />
            </li>
            <li>
              <label for="pwd">비밀번호</label>
              <input
                id="pwd"
                name="pwd"
                type="password"
                required
                placeholder="비밀번호를 입력하세요"
              />
            </li>
          </ul>

          <div class="button-group">
            <button type="submit">로그인</button>
          </div>

          <div class="extra-links">
            <a href="register.html">회원가입</a> |
            <a href="#">아이디/비밀번호 찾기</a>
          </div>
        </form>
      </div>
    </div>

    <div class="footer">
      <p>
        (00486) 서울특별시 강아지구 강쥐로 104<br />
        대표번호: 1577-1577 | 관리: 강아지를 사랑하는 모임
      </p>
    </div>
  </body>
</html>
